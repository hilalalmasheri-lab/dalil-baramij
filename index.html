<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>موجه البرامج الذكي 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo','Tahoma',sans-serif;direction:rtl;
  background:linear-gradient(145deg,#04091a 0%,#07112b 50%,#04091a 100%);
  min-height:100vh;color:#e2e8f0;padding:0}
#app{max-width:980px;margin:0 auto;padding:14px}

/* Header */
.hdr{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(0,212,170,0.18);
  backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;
  padding:11px 18px;display:flex;align-items:center;justify-content:space-between;
  margin:-14px -14px 20px}
.logo-icon{width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#00d4aa,#3b82f6);
  display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:15px;font-weight:900;color:#fff}
.logo-sub{font-size:9px;color:rgba(0,212,170,0.75)}

/* Cards */
.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;padding:18px 16px;margin-bottom:12px}

/* Form layout */
.form-layout{display:grid;grid-template-columns:1fr 172px;gap:14px;align-items:start}
@media(max-width:700px){.form-layout{grid-template-columns:1fr}.avg-panel{display:none}}

/* Avg panel */
.avg-panel{position:sticky;top:70px}
.avg-panel-inner{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.2);
  border-radius:14px;padding:16px 12px;text-align:center}
.avgnum{font-size:30px;font-weight:900;line-height:1;transition:color .4s}

/* Labels */
.flbl{display:block;font-size:11px;color:rgba(0,212,170,0.85);margin-bottom:5px;font-weight:700}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sec-name{font-size:13px;font-weight:800;color:#fff}
.sec-sub{font-size:9px;color:rgba(226,232,240,0.38);margin-top:1px}
.sub-lbl{font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;margin:10px 0 6px}

/* Inputs */
input,select{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  color:#fff;padding:8px 11px;border-radius:9px;font-family:inherit;
  font-size:13px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus{border-color:#00d4aa;box-shadow:0 0 0 2px rgba(0,212,170,0.12)}
select option{background:#07112b}

/* Grade columns */
.fhdr-row{display:grid;grid-template-columns:1fr 110px 110px;gap:7px;
  padding:0 9px 6px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:6px}
.fhdr-row span{font-size:9px;color:rgba(226,232,240,0.32);letter-spacing:.3px;text-align:center}
.fhdr-row span:first-child{text-align:right}

/* Grade row */
.grow{display:grid;grid-template-columns:1fr 110px 110px;gap:7px;align-items:center;
  border-radius:9px;padding:6px 9px;border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.018);transition:all .17s;margin-bottom:4px}
.grow:hover{background:rgba(255,255,255,0.035)}
.grow-lbl{font-size:11px;color:rgba(226,232,240,0.85)}

/* Professional number input */
.finp{background:rgba(255,255,255,0.07)!important;border:1px solid rgba(255,255,255,0.12)!important;
  color:rgba(226,232,240,0.4)!important;padding:7px 8px!important;border-radius:8px!important;
  font-size:14px!important;font-weight:700!important;text-align:center;
  transition:all .2s!important;-moz-appearance:textfield;width:100%!important}
.finp::-webkit-inner-spin-button,.finp::-webkit-outer-spin-button{opacity:0;width:0}
.finp:focus{border-color:#00d4aa!important;box-shadow:0 0 0 2px rgba(0,212,170,0.12)!important;
  color:#fff!important;outline:none!important}
.finp::placeholder{color:rgba(226,232,240,0.18)!important;font-weight:400!important;font-size:11px!important}

/* Radio items */
.ritem{display:flex;align-items:center;gap:7px;border-radius:9px;padding:6px 9px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  cursor:pointer;user-select:none;transition:all .15s;margin-bottom:4px}
.ritem:hover{background:rgba(255,255,255,0.04)}
.ritem.on{background:rgba(0,212,170,0.07);border-color:rgba(0,212,170,0.35)}
.rgroup{display:flex;flex-direction:column;gap:0}
.rdot{width:11px;height:11px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.28);flex-shrink:0;transition:all .15s}
.rdot.on{border-color:#00d4aa;background:#00d4aa}

/* Field cards */
.gfields{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:7px}
.fcard{cursor:pointer;border-radius:11px;padding:8px 10px;
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);
  transition:all .14s;user-select:none}
.fcard:hover{background:rgba(255,255,255,0.04)}
.fcard.on{background:rgba(0,212,170,0.07);border-color:rgba(0,212,170,0.3)}

/* Buttons */
.sbtn{width:100%;padding:13px;background:linear-gradient(135deg,#00d4aa,#3b82f6);
  color:#fff;font-size:14px;font-weight:800;border-radius:12px;border:none;
  cursor:pointer;font-family:inherit;box-shadow:0 4px 18px rgba(0,212,170,0.25);
  transition:opacity .2s}
.sbtn:hover{opacity:.9}
.gbtn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:#e2e8f0;padding:7px 14px;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer}
.gbtn:hover{background:rgba(255,255,255,0.1)}
.ebtn{display:inline-flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;
  font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid;transition:opacity .15s}
.ebtn:hover{opacity:.85}
.ebtn-excel{color:#00d4aa;border-color:rgba(0,212,170,0.35);background:rgba(0,212,170,0.08)}
.ebtn-png{color:#3b82f6;border-color:rgba(59,130,246,0.35);background:rgba(59,130,246,0.08)}
.ebtn-pdf{color:#f59e0b;border-color:rgba(245,158,11,0.35);background:rgba(245,158,11,0.08)}
.ebtn-wa{color:#22c55e;border-color:rgba(34,197,94,0.35);background:rgba(34,197,94,0.08)}

/* Tabs */
.tab{padding:7px 13px;border-radius:9px;border:none;font-size:12px;font-weight:700;
  font-family:inherit;cursor:pointer;background:rgba(255,255,255,0.06);
  color:rgba(226,232,240,0.6);transition:all .15s}
.tab.on{background:linear-gradient(135deg,#00d4aa,#3b82f6);color:#fff}

/* Results */
.res-banner{background:linear-gradient(135deg,rgba(0,212,170,0.09),rgba(59,130,246,0.09));
  border:1px solid rgba(0,212,170,0.22);border-radius:15px;padding:16px 18px;
  display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.res-score-circle{width:58px;height:58px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#00d4aa,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;text-align:center;line-height:1.3}

/* Table */
.rtbl{width:100%;border-collapse:collapse;font-size:12px;min-width:480px}
.rtbl th{padding:8px 10px;background:rgba(255,255,255,0.05);color:rgba(0,212,170,0.9);
  font-weight:700;border-bottom:1px solid rgba(255,255,255,0.07);text-align:right;white-space:nowrap}
.rtbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
.rtbl tr:hover td{background:rgba(0,212,170,0.03)}
.cbadge{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.28);
  color:#93c5fd;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700}
.nbadge{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);
  color:rgba(251,191,36,0.9);padding:2px 6px;border-radius:4px;font-size:10px}
.rank-c{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;margin:0 auto;font-size:11px;font-weight:900}

/* Progress */
.pbar-t{height:3px;border-radius:2px;background:rgba(255,255,255,0.07)}
.pbar-f{height:100%;border-radius:2px;transition:width 1s ease}
.ptrack{height:6px;border-radius:3px;background:rgba(255,255,255,0.07);margin:8px 0;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#00d4aa);transition:width .8s ease}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:80px;height:80px;border-radius:50%;margin:0 auto 18px;
  background:conic-gradient(from 0deg,#00d4aa,#3b82f6,#00d4aa);
  animation:spin 1.3s linear infinite;
  display:flex;align-items:center;justify-content:center}
.spinner-in{width:62px;height:62px;border-radius:50%;background:#07112b;
  display:flex;align-items:center;justify-content:center;font-size:26px}

/* Error */
.errbox{background:rgba(251,113,133,0.07);border:1px solid rgba(251,113,133,0.2);
  border-radius:9px;padding:9px 13px;color:#fda4af;font-size:13px;margin-bottom:10px}

/* 2-col grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:480px){.g2{grid-template-columns:1fr}}
.scroll{overflow-x:auto}

/* ── Certificate Upload ── */
.upload-zone{
  border:2px dashed rgba(0,212,170,0.35);border-radius:16px;
  padding:32px 20px;text-align:center;cursor:pointer;
  background:rgba(0,212,170,0.03);transition:all .2s;
  position:relative;
}
.upload-zone:hover{border-color:rgba(0,212,170,0.6);background:rgba(0,212,170,0.06)}
.upload-zone.dragover{border-color:#00d4aa;background:rgba(0,212,170,0.1)}
.upload-icon{font-size:42px;margin-bottom:10px}
.upload-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:5px}
.upload-sub{font-size:12px;color:rgba(226,232,240,0.45);line-height:1.6}
.upload-btn{
  display:inline-block;margin-top:14px;padding:9px 22px;
  background:linear-gradient(135deg,#00d4aa,#3b82f6);
  color:#fff;font-size:13px;font-weight:700;border-radius:10px;
  font-family:inherit;border:none;cursor:pointer;
}
.or-divider{
  display:flex;align-items:center;gap:12px;margin:18px 0;
  color:rgba(226,232,240,0.3);font-size:12px;
}
.or-divider::before,.or-divider::after{
  content:"";flex:1;height:1px;background:rgba(255,255,255,0.07)
}
/* Scan result preview */
.scan-preview{
  background:rgba(0,212,170,0.04);border:1px solid rgba(0,212,170,0.2);
  border-radius:14px;padding:16px;margin-bottom:12px;
}
.scan-row{
  display:grid;grid-template-columns:1fr 90px 90px 60px;
  gap:8px;align-items:center;padding:5px 8px;border-radius:8px;
  margin-bottom:3px;background:rgba(255,255,255,0.02);
}
.scan-row:hover{background:rgba(255,255,255,0.04)}
.scan-lbl{font-size:11.5px;color:rgba(226,232,240,0.85)}
.scan-val{
  font-size:13px;font-weight:700;text-align:center;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  border-radius:7px;padding:4px 6px;color:#00d4aa;
}
.scan-avg{font-size:12px;font-weight:800;text-align:center;color:rgba(0,212,170,0.7)}
.conf-btn{
  width:100%;padding:12px;background:linear-gradient(135deg,#00d4aa,#3b82f6);
  color:#fff;font-size:14px;font-weight:800;border-radius:11px;border:none;
  cursor:pointer;font-family:inherit;margin-top:10px;
}
.retry-btn{
  width:100%;padding:10px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);color:#e2e8f0;
  font-size:12px;font-weight:700;border-radius:10px;border:none;
  cursor:pointer;font-family:inherit;margin-top:6px;
}
</style>
</head>

/* ═══ CALC ═══ */
function calcAvg(g, mathKey, electiveKeys){
  const all8keys = [...MANDATORY.map(s=>s.k), mathKey, ...electiveKeys].filter(Boolean);
  const vals = all8keys.map(k=>Number(g[k]||0)).filter(v=>v>0);
  if(!vals.length) return 0;
  return +(vals.reduce((a,b)=>a+b,0)/8).toFixed(2);
}
function calcProgScore(avg, g, code){
  /* المعادلة الرسمية — دليل الطالب 2026:
     المعدل التنافسي = (المعدل العام × 40%) + (متوسط مواد التخصص × 60%)
     الأولوية: PROG_OR → PROG_CUSTOM_REQ → PROG_OVERRIDE/FIELD_REQ */

  /* 1. برامج بشرط OR: يُختار أفضل مادة متاحة من كل مجموعة */
  if(PROG_OR[code]){
    const info = PROG_OR[code];
    const req  = [...info.m];
    for(const group of info.or){
      const avail = group
        .map(k=>[Number(g[k]||0), k])
        .filter(([v])=>v>0)
        .sort((a,b)=>b[0]-a[0]);
      if(avail.length) req.push(avail[0][1]);
    }
    const rv = req.map(k=>g[k]?Number(g[k]):null).filter(v=>v&&v>0);
    const aR = rv.length ? rv.reduce((a,b)=>a+b,0)/rv.length : avg;
    return +(avg*0.4 + aR*0.6).toFixed(2);
  }

  /* 2. برامج بمواد ثابتة مختلفة عن مجالها */
  if(PROG_CUSTOM_REQ[code]){
    const req = PROG_CUSTOM_REQ[code];
    const rv  = req.map(k=>g[k]?Number(g[k]):null).filter(v=>v&&v>0);
    const aR  = rv.length ? rv.reduce((a,b)=>a+b,0)/rv.length : avg;
    return +(avg*0.4 + aR*0.6).toFixed(2);
  }

  /* 3. مواد المجال (الحالة الافتراضية لبقية البرامج) */
  const fieldKey = PROG_OVERRIDE[code] || PROG_FIELD[code] || "";
  const req = FIELD_REQ[fieldKey] || [];
  if(!req.length) return +avg.toFixed(2);
  const rv  = req.map(k=>g[k]?Number(g[k]):null).filter(v=>v&&v>0);
  const aR  = rv.length ? rv.reduce((a,b)=>a+b,0)/rv.length : avg;
  return +(avg*0.4 + aR*0.6).toFixed(2);
}

/* ═══ STATE ═══ */
function setGrade(k, sem, v){
  /* sem = 1 (فصل أول) أو 2 (فصل ثاني) */
  if(sem===1) S.g1[k] = v;
  else         S.g2[k] = v;

  /* احتساب متوسط الفصلين لهذه المادة */
  const v1 = Number(S.g1[k]||0);
  const v2 = Number(S.g2[k]||0);
  if(v1>0 && v2>0)  S.g[k] = +((v1+v2)/2).toFixed(2);
  else if(v1>0)     S.g[k] = v1;
  else if(v2>0)     S.g[k] = v2;
  else              S.g[k] = "";

  /* المعدل العام */
  S.avg = calcAvg(S.g, S.mathType, S.selE);
  const avgCol = S.avg>=85?"#00d4aa":S.avg>=75?"#3b82f6":S.avg>=65?"#f59e0b":S.avg>0?"#fb7185":"rgba(226,232,240,0.3)";

  /* تحديث لوحة المعدل العائمة */
  const an = document.getElementById("avgNum");
  if(an){ an.textContent = S.avg>0 ? S.avg.toFixed(2)+"%" : "—"; an.style.color = avgCol; }
  const ab = document.getElementById("avgBar");
  if(ab){ ab.style.width = Math.min(S.avg,100)+"%" ; ab.style.background = `linear-gradient(90deg,#3b82f6,${avgCol})`; }
  const as = document.getElementById("avgSub");
  const fc = getAllKeys().filter(k=>S.g[k]&&Number(S.g[k])>0).length;
  if(as) as.textContent = fc===0?"أدخل درجات المواد": fc<8? fc+" / 8 مواد" : "✅ جميع المواد";

  /* تلوين صف المادة */
  const row = document.getElementById("grow-"+k);
  if(row && S.g[k]){
    row.style.borderColor = "#6366f144";
    row.style.background  = "#6366f10a";
  } else if(row){
    row.style.borderColor = "";
    row.style.background  = "";
  }
}
function setMath(k){
  if(S.mathType && S.mathType !== k){
    S.g[S.mathType]=""; S.g1[S.mathType]=""; S.g2[S.mathType]="";
  }
  S.mathType = k;
  S.avg = calcAvg(S.g, S.mathType, S.selE);

function toggleElective(k){
  const was = S.selE.includes(k);
  if(was){
    S.selE = S.selE.filter(x=>x!==k);

/* ═══ GET ELIGIBLE PROGRAMS ═══ */
function getProgs(fieldKey, avg, g, gender){
  var progs = [];
  var seenThisField = new Set();

  // Go through all programs in PROG_FIELD that match this field
  var allCodes = Object.keys(PROG_FIELD);
  for(var i=0; i<allCodes.length; i++){
    var code = allCodes[i];
    if(PROG_FIELD[code] !== fieldKey) continue;
    if(seenThisField.has(code)) continue;
    seenThisField.add(code);

    // Find program data from PROG_DB
    var pd = PROG_DB[code];
    if(!pd) continue;

    // Gender check
    if(pd.g === 'f' && gender !== 'أنثى') continue;
    if(pd.g === 'm' && gender !== 'ذكر') continue;

    // Min avg check
    if(avg < (pd.min || 0)) continue;

    // Calculate competitive score
    var score = calcProgScore(avg, g, code);

    progs.push({
      c: code,
      n: pd.n || code,
      i: pd.i || '—',
      co: pd.co || 'عُمان',
      no: pd.no || '—',
      score: score,
      min: pd.min || 0
    });
  }

  // Sort descending by score
  progs.sort(function(a,b){ return b.score - a.score; });
  return progs;
}

/* ═══ ANALYZE ═══ */
function analyze(){
  S.err = "";
  if(!S.mathType)       { S.err="يرجى اختيار نوع الرياضيات أولاً"; render(); return; }
  if(!S.selE.length)    { S.err="يرجى اختيار مادة اختيارية واحدة على الأقل"; render(); return; }
  if(!S.selF.length)    { S.err="يرجى اختيار مجال تخصص واحد على الأقل"; render(); return; }
  S.avg = calcAvg(S.g, S.mathType, S.selE);
  if(S.avg < 40)        { S.err="يرجى إدخال درجات كافية (المعدل المحسوب أقل من 40%)"; render(); return; }

  S.step = "loading"; render();

  /* defer computation to let loading screen paint */
  requestAnimationFrame(()=>{
    const fieldResults = [];
    for(const fk of S.selF){
      const fd    = FIELDS.find(f=>f.k===fk);
      const progs = getProgs(fk, S.avg, S.g, S.gender);
      if(progs.length > 0)
        fieldResults.push({...fd, progs, top: progs[0].score});
    }
    fieldResults.sort((a,b)=>b.top-a.top);

    /* إزالة البرامج المكررة — كل برنامج يظهر مرة واحدة فقط في المجال الأعلى تنافسياً */
    const seenCodes = new Set();
    for(const f of fieldResults){
      f.progs = f.progs.filter(p=>{
        if(seenCodes.has(p.c)) return false;
        seenCodes.add(p.c);
        return true;
      });
    }
    /* تحديث أعلى معدل بعد الإزالة */
    for(const f of fieldResults){
      if(f.progs.length) f.top = f.progs[0].score;
    }
    /* إزالة المجالات الفارغة بعد إزالة المكرر */
    const cleanedFields = fieldResults.filter(f=>f.progs.length>0);
    fieldResults.length=0; fieldResults.push(...cleanedFields);

    const noElig = S.selF.filter(k=>!fieldResults.find(f=>f.k===k));
    const total  = fieldResults.reduce((s,f)=>s+f.progs.length, 0);
    const top    = fieldResults[0];
    const gold   = top
      ? "مجال "+top.l+" هو الأفضل توافقاً — أعلى معدل تنافسي "+top.top+' ('+lvl(top.top)+") لبرنامج "+top.progs[0].n
      : "لا توجد برامج مؤهلة. جرّب مجالات أخرى أو أدخل درجات أعلى.";

    S.res = {fieldResults, noElig, total, gold};
    S.step = "results"; S.tab = "elig";
    render();
  });
}

function exportExcel(){
  if(!S.res) return;
  const {fieldResults} = S.res;
  const rows = [];
  let rank = 1;
  for(const f of fieldResults){
    for(const p of (f.progs||[])){
      rows.push([
        rank++,
        p.n   || "—",

function exportPNG(){

  const colW   = [40, 240, 80, 220, 80, 140, 110];
  const rowH   = 36;
  const padX   = 12;
  const headerH = 70;
  const W = colW.reduce((a,b)=>a+b,0) + 40;

  /* Collect rows */
  const rows = [];
  let rank = 1;

        p.score != null ? String(p.score) : "—"]);
    }
  }

  const H = headerH + (rows.length + 1) * rowH + 20;
  const canvas = document.createElement("canvas");
  canvas.width  = W * 2; canvas.height = H * 2;
  const ctx = canvas.getContext("2d");
  ctx.scale(2, 2);

  /* Background */
  ctx.fillStyle = "#0b1535";
  ctx.fillRect(0, 0, W, H);

  /* Header */
  ctx.fillStyle = "rgba(0,212,170,0.1)";
  ctx.fillRect(0, 0, W, headerH);
  ctx.fillStyle = "#00d4aa";
  ctx.font = "bold 15px 'Cairo','Tajawal',sans-serif";
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  ctx.fillText("موجه البرامج الذكي 2026 — دليل الطالب", W - 20, 22);
  ctx.fillStyle = "rgba(226,232,240,0.7)";
  ctx.font = "12px 'Cairo','Tajawal',sans-serif";
  ctx.fillText(`${studentName} | المعدل العام: ${avg}%`, W - 20, 44);
  ctx.fillStyle = "rgba(226,232,240,0.35)";
  ctx.font = "11px 'Cairo','Tajawal',sans-serif";
  ctx.fillText(`${rows.length} برنامج مؤهل`, W - 20, 62);

  /* Table header row */
  let y = headerH;
  ctx.fillStyle = "rgba(0,212,170,0.15)";
  ctx.fillRect(0, y, W, rowH);
  ctx.fillStyle = "#00d4aa";
  ctx.font = "bold 11px 'Cairo','Tajawal',sans-serif";
  ctx.textBaseline = "middle";
  let xCursor = W - 20;
  for(let ci=0; ci<cols.length; ci++){
    ctx.textAlign = "right";
    ctx.fillText(cols[ci], xCursor, y + rowH/2);
    xCursor -= colW[ci];
  }

  /* Divider */
  ctx.strokeStyle = "rgba(0,212,170,0.3)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, y + rowH); ctx.lineTo(W, y + rowH); ctx.stroke();
  y += rowH;

  /* Data rows */
  for(let ri=0; ri<rows.length; ri++){
    const row = rows[ri];
    const score = parseFloat(row[6]);
    const bgAlpha = ri%2===0 ? "rgba(255,255,255,0.02)" : "transparent";
    ctx.fillStyle = bgAlpha;
    ctx.fillRect(0, y, W, rowH);

    /* Score color */
    const scoreColor = score>=85?"#00d4aa":score>=70?"#3b82f6":score>=60?"#f59e0b":"#fb7185";

    xCursor = W - 20;
    for(let ci=0; ci<row.length; ci++){
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      if(ci === 0){
        ctx.fillStyle = "rgba(226,232,240,0.35)";
        ctx.font = "11px 'Cairo','Tajawal',sans-serif";
      } else if(ci === row.length - 1){
        ctx.fillStyle = scoreColor;
        ctx.font = "bold 12px 'Cairo','Tajawal',sans-serif";
      } else if(ci === 2){
        ctx.fillStyle = "#93c5fd";
        ctx.font = "11px monospace";
      } else {
        ctx.fillStyle = "rgba(226,232,240,0.8)";
        ctx.font = "11px 'Cairo','Tajawal',sans-serif";
      }
      const cellW = colW[ci];
      /* Truncate long text */
      let txt = String(row[ci]);
      ctx.save();
      ctx.beginPath(); ctx.rect(xCursor-cellW+5, y, cellW-5, rowH); ctx.clip();
      ctx.fillText(txt, xCursor, y + rowH/2);
      ctx.restore();
      xCursor -= cellW;
    }

    /* Row divider */
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0, y+rowH); ctx.lineTo(W, y+rowH); ctx.stroke();
    y += rowH;
  }

  /* Footer */
  ctx.fillStyle = "rgba(226,232,240,0.2)";
  ctx.font = "10px 'Cairo','Tajawal',sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("موجه البرامج الذكي · برامج القبول الموحد · سلطنة عُمان", W/2, y+12);

  /* Download */
  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `مستشاري_الأكاديمي_${studentName}_2026.png`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
  }, "image/png");
}

function handleDrop(ev){

  document.getElementById('uploadZone').classList.remove('dragover');
}

function handleDragOver(ev){

}

function handleFileInput(ev){

function processFile(file){
  if(!file.type.match(/image\/(jpeg|jpg|png|webp)/i)){
    alert('يرجى اختيار صورة (JPG أو PNG)'); return;
  }
  S.scanning=true; S.err=""; S.step="scanning"; render();

  // ضغط الصورة قبل الإرسال لتقليل الحجم
  var img = new Image();
  var objectUrl = URL.createObjectURL(file);
  img.onload = function(){
    URL.revokeObjectURL(objectUrl);
    var canvas = document.createElement('canvas');
    var maxW = 1600, maxH = 1600;
    var w = img.width, h = img.height;
    if(w > maxW || h > maxH){
      var ratio = Math.min(maxW/w, maxH/h);
      w = Math.round(w*ratio);
      h = Math.round(h*ratio);
    }
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    // ضغط بجودة 85%
    var compressed = canvas.toDataURL('image/jpeg', 0.85);
    var b64 = compressed.split(',')[1];
    console.log('Image compressed:', Math.round(b64.length/1024)+'KB');
    callVisionAPI(b64, 'image/jpeg');
  };
  img.onerror = function(){
    // إذا فشل الضغط، أرسل الصورة الأصلية
    var reader = new FileReader();
    reader.onload = function(e){
      var b64 = e.target.result.split(',')[1];
      callVisionAPI(b64, file.type||'image/jpeg');
    };
    reader.readAsDataURL(file);
  };
  img.src = objectUrl;
}

async function callVisionAPI(b64, mtype){
  try{
    var resp = await fetch("/.netlify/functions/scan",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({image:b64, mediaType:mtype})
    });
    if(!resp.ok){
      var errData = await resp.json().catch(()=>({}));
      throw new Error(errData.error || "خطأ في الخادم ("+resp.status+")");
    }
    var data=await resp.json();
    if(data.error){throw new Error(data.error);}
    S.scanData=data; S.scanning=false; S.step="confirm"; render();
  }catch(err){
    S.scanning=false; S.err="خطأ في قراءة الشهادة: "+err.message;
    S.step="upload"; render();
  }
}

function confirmScan(){
  var d=S.scanData;
  if(!d) return;

  // بيانات الطالب
  if(d.name)   S.name   = d.name;
  if(d.gender) S.gender = d.gender;

  // تعريف المواد الإجبارية والرياضيات
  var MANDATORY_KEYS = ["تربية_اسلامية","عربي","انجليزي","دراسات_اجتماعية"];
  var MATH_KEYS      = ["رياضيات_متقدمة","رياضيات_اساسية"];
  var ALL_ELEC_KEYS  = ELECTIVES.map(function(e){return e.k;});

  // تطبيق الدرجات
  var g = d.grades || {};
  var detectedMath     = null;
  var detectedElectives = [];

  Object.keys(g).forEach(function(k){
    var v = g[k];
    if(!v || typeof v !== "object") return;
    var v1 = Number(v.f1||0), v2 = Number(v.f2||0);
    if(v1<=0 && v2<=0) return;

    // حفظ الدرجات
    if(v1>0) S.g1[k] = v1;
    if(v2>0) S.g2[k] = v2;
    if(v1>0&&v2>0) S.g[k] = +((v1+v2)/2).toFixed(2);
    else if(v1>0)  S.g[k] = v1;
    else           S.g[k] = v2;

    // كشف نوع الرياضيات
    if(MATH_KEYS.indexOf(k) >= 0) detectedMath = k;

    // كشف المواد الاختيارية
    if(MANDATORY_KEYS.indexOf(k) < 0 && MATH_KEYS.indexOf(k) < 0){
      if(ALL_ELEC_KEYS.indexOf(k) >= 0){
        detectedElectives.push(k);
      }
    }
  });

  // تعيين نوع الرياضيات
  if(d.math_type && MATH_KEYS.indexOf(d.math_type) >= 0){
    S.mathType = d.math_type;
  } else if(detectedMath){
    S.mathType = detectedMath;
  }

  // تعيين المواد الاختيارية — من الصورة أو من الكشف التلقائي
  var electives = [];
  if(d.electives && d.electives.length > 0){
    electives = d.electives.filter(function(k){
      return ALL_ELEC_KEYS.indexOf(k) >= 0;
    }).slice(0,3);
  }
  // إذا لم يُعطِ النموذج اختياريات كافية، استكمل من الكشف التلقائي
  if(electives.length < 3){
    detectedElectives.forEach(function(k){
      if(electives.indexOf(k) < 0 && electives.length < 3) electives.push(k);
    });
  }
  S.selE = electives;

  // إعادة حساب المعدل
  S.avg = calcAvg(S.g, S.mathType, S.selE);
  S.scanData = null;
  S.step = "form";
  render();
}

        "فيزياء":"الفيزياء","كيمياء":"الكيمياء","احياء":"الأحياء",

        "موسيقى":"المهارات الموسيقية","رياضة":"الرياضة المدرسية",
        "ادارة_اعمال":"إدارة الأعمال","جغرافيا":"الجغرافيا",
        "تاريخ":"التاريخ","علوم_تقانة":"العلوم والتقانة",
        "انجليزي_متقدم":"الإنجليزية المتقدمة","فرنسي":"اللغة الفرنسية"
      };
      var lbl=LABELS[k]||k;
      return '<div class="scan-row">'
        +'<span class="scan-lbl">'+lbl+'</span>'
        +'<div class="scan-val">'+v1+'</div>'
        +'<div class="scan-val">'+v2+'</div>'
        +'<div class="scan-avg">'+avg_v+'</div>'
        +'</div>';
    }).join("");
    app.innerHTML=
      '<div class="hdr">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div class="logo-icon">🎯</div>'
      +'<div><div class="logo-text">موجه البرامج الذكي</div>'
      +'<div class="logo-sub">برامج القبول الموحد · سلطنة عُمان</div></div></div></div>'
      +'<div style="max-width:620px;margin:20px auto;padding:0 14px">'
      +'<div style="text-align:center;margin-bottom:18px">'
      +'<div style="font-size:28px;margin-bottom:6px">✅</div>'
      +'<h2 style="font-size:18px;font-weight:900;color:#fff;margin-bottom:4px">تم استخراج الدرجات</h2>'
      +'<span style="background:'+confColor+'18;border:1px solid '+confColor+'44;color:'+confColor+';font-size:11px;padding:3px 12px;border-radius:20px">'
      +confText+'</span></div>'
      +'<div class="scan-preview">'
      +(d.name?'<div style="font-size:13px;color:#00d4aa;font-weight:700;margin-bottom:10px">👤 '+esc(d.name)+(d.gender?" — "+esc(d.gender):"")+'</div>':"")
      +'<div style="display:grid;grid-template-columns:1fr 90px 90px 60px;gap:8px;padding:5px 8px;margin-bottom:6px">'
      +'<span style="font-size:9px;color:rgba(226,232,240,0.3)">المادة</span>'
      +'<span style="font-size:9px;color:rgba(226,232,240,0.3);text-align:center">ف١</span>'
      +'<span style="font-size:9px;color:rgba(226,232,240,0.3);text-align:center">ف٢</span>'
      +'<span style="font-size:9px;color:rgba(226,232,240,0.3);text-align:center">متوسط</span>'
      +'</div>'
      +rows
      +'</div>'
      +'<div style="background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:rgba(251,191,36,0.85)">'
      +'⚠️ راجع الأرقام أعلاه قبل التأكيد — يمكنك تعديلها يدوياً بعد التأكيد</div>'
      +'<button class="conf-btn" onclick="confirmScan()">✅ تأكيد الدرجات والمتابعة</button>'
      +'<button class="retry-btn" onclick="rescan()">🔄 ارفع صورة أخرى</button>'
      +'<button class="retry-btn" onclick="skipUpload()" style="margin-top:4px">✏️ إدخال يدوي</button>'
      +'</div>';
    return;
  }

  /* LOADING */
  if(step==="loading"){
    app.innerHTML='<div style="text-align:center;padding:80px 20px">'
      +'<div class="spinner"><div class="spinner-in">🧠</div></div>'
      +'<h2 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:8px">جارٍ تحليل البرامج...</h2>'
      +'<p style="color:rgba(226,232,240,0.45);font-size:13px">يحسب المعدل التنافسي لكل برنامج...</p>'
      +'</div>';
    return;
  }

  /* RESULTS */
  if(step==="results" && res){
    var fR=res.fieldResults||[], noE=res.noElig||[], tot=res.total||0, gold=res.gold||"";
    var bestTop=fR[0]?fR[0].top:"—";
    var avgCol=scC(avg);
    var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#00d4aa,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:18px">🎯</div>'
      +'<div><div style="font-size:15px;font-weight:800;color:#fff">موجه البرامج الذكي</div>'
      +'<div style="font-size:9px;color:rgba(0,212,170,0.8)">برامج القبول الموحد · سلطنة عُمان</div></div></div>'
      +'<button class="gbtn" onclick="resetApp()">← تحليل جديد</button></div>';

    /* Banner */
    html+='<div class="res-banner">'
      +'<div class="res-score-circle">'+bestTop+'<br><span style="font-size:8px;opacity:.8">أعلى معدل</span></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:9px;color:#00d4aa;font-weight:700;margin-bottom:2px">⭐ التوصية الذهبية</div>'
      +'<div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:6px">'+esc(gold)+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:rgba(226,232,240,0.5);margin-bottom:8px">'
      +'<span>✅ '+fR.length+' مجال مؤهل</span><span>·</span>'
      +'<span>📋 '+tot+' برنامج</span><span>·</span>'
      +'<span>📊 '+avg.toFixed(2)+'%</span></div>'
      +'<div class="ptrack"><div class="pfill" style="width:'+Math.min(avg,100)+'%"></div></div>'
      +'</div></div>';

    /* Tabs + Export */
    html+='<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center">'
      +'<button class="tab'+(tab==="elig"?" on":"")+'" onclick="setTab(\'elig\')">✅ المؤهلة ('+tot+')</button>'
      +(noE.length?'<button class="tab'+(tab==="excl"?" on":"")+'" onclick="setTab(\'excl\')">❌ المستبعدة ('+noE.length+')</button>':"")
      +'<div style="margin-right:auto;display:flex;gap:5px;flex-wrap:wrap">'
      +'<button class="ebtn ebtn-excel" onclick="exportExcel()">📊 Excel</button>'
      +'<button class="ebtn ebtn-png" onclick="exportPNG()">🖼️ PNG</button>'
      +'<button class="ebtn ebtn-pdf" onclick="exportPDF()">📄 PDF</button>'
      +'<button class="ebtn ebtn-wa" onclick="shareWhatsApp()">📱 واتساب</button>'
      +'</div></div>';

    /* Eligible programs */
    if(tab==="elig"){
      if(!fR.length){
        html+='<div style="text-align:center;padding:3rem;color:rgba(226,232,240,0.4)">'
          +'<div style="font-size:40px;margin-bottom:12px">🔍</div>'
          +'<p style="font-size:15px">لا توجد برامج مؤهلة</p></div>';
      }
      for(var fi=0;fi<fR.length;fi++){
        var f=fR[fi], isTop=fi===0, tc=scC(f.top);
        html+='<div style="background:rgba(255,255,255,0.025);border:1px solid '+(isTop?"rgba(0,212,170,0.3)":"rgba(255,255,255,0.07)")+';border-radius:14px;overflow:hidden;margin-bottom:14px">';
        /* Field header */
        html+='<div style="padding:12px 16px;background:'+(isTop?"rgba(0,212,170,0.05)":"rgba(255,255,255,0.015)")+';border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
        if(isTop) html+='<span style="background:linear-gradient(135deg,#00d4aa,#3b82f6);color:#fff;font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px">⭐ الأفضل</span>';
        html+='<span style="font-size:18px">'+esc(f.ic||"🎓")+'</span>'
          +'<div><div style="font-size:13px;font-weight:800;color:#fff">'+esc(f.l)+'</div>'
          +'<div style="font-size:10px;color:rgba(226,232,240,0.38)">'+f.progs.length+' برنامج</div></div>'
          +'<div style="margin-right:auto;text-align:center">'
          +'<div style="font-size:20px;font-weight:900;color:'+tc+'">'+f.top+'</div>'
          +'<div style="font-size:8px;color:rgba(226,232,240,0.35)">أعلى معدل</div></div></div>';
        /* Score bar */
        html+='<div style="padding:0 16px"><div class="pbar-t">'
          +'<div class="pbar-f" style="width:'+Math.min(f.top,100)+'%;background:linear-gradient(90deg,'+tc+'77,'+tc+')"></div>'
          +'</div></div>';
        /* Table */
        html+='<div style="padding:10px 12px"><div class="scroll"><table class="rtbl"><thead><tr>'
          +'<th style="width:26px;text-align:center">#</th>'
          +'<th style="width:68px">الرمز</th>'
          +'<th>البرنامج</th><th>المؤسسة</th>'
          +'<th style="width:100px;text-align:center">المعدل التنافسي</th>'
          +'<th style="width:75px;text-align:center">الدولة</th>'
          +'<th style="width:110px">ملاحظات</th>'
          +'</tr></thead><tbody>';
        for(var pi=0;pi<f.progs.length;pi++){
          var p=f.progs[pi], pc=scC(p.score);
          var local=p.co==="عُمان";
          var hasNote=p.no&&p.no!=="—"&&p.no!=="لا ملاحظات";
          html+='<tr>'
            +'<td style="text-align:center"><div class="rank-c" style="background:'+pc+'18;border:1px solid '+pc+'40;color:'+pc+'">'+(pi+1)+'</div></td>'
            +'<td><span class="cbadge">'+esc(p.c||"—")+'</span></td>'
            +'<td style="font-weight:600;color:#e2e8f0">'+esc(p.n||"—")+'</td>'
            +'<td style="color:rgba(226,232,240,0.6);font-size:11px">'+esc(p.i||"—")+'</td>'
            +'<td style="text-align:center"><div style="background:'+pc+'12;border:1px solid '+pc+'35;border-radius:7px;padding:3px 6px;display:inline-block">'
            +'<div style="font-size:13px;font-weight:900;color:'+pc+'">'+p.score+'</div>'
            +'<div style="font-size:7px;color:'+pc+';opacity:.7">'+lvl(p.score)+'</div></div></td>'
            +'<td style="text-align:center;font-size:11px;color:'+(local?"rgba(0,212,170,0.8)":"rgba(251,191,36,0.8)")+'">'
            +(local?"🏠":"✈️")+' '+esc(p.co||"—")+'</td>'
            +'<td>'+(hasNote?'<span class="nbadge">'+esc(p.no)+'</span>':'<span style="color:rgba(226,232,240,0.2);font-size:10px">—</span>')+'</td>'
            +'</tr>';
        }
        html+='</tbody></table></div></div></div>';
      }
    }

    /* Excluded */
    if(tab==="excl"){
      for(var ei=0;ei<noE.length;ei++){
        var ef=noE[ei];
        html+='<div style="background:rgba(251,113,133,0.04);border:1px solid rgba(251,113,133,0.12);border-radius:11px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px">'
          +'<span style="font-size:20px">'+esc(ef.ic||"🚫")+'</span>'
          +'<div><div style="font-size:13px;font-weight:700;color:rgba(253,164,175,0.85)">'+esc(ef.l)+'</div>'
          +'<div style="font-size:11px;color:rgba(226,232,240,0.4)">'+esc(ef.reason||"المعدل أقل من الحد الأدنى")+'</div></div></div>';
      }
    }

    app.innerHTML=html;
    return;
  }

  /* FORM */
  var eCnt=selE.length;
  var filledCount=getAllKeys().filter(function(k){return S.g[k]&&Number(S.g[k])>0}).length;
  var avgCol=avg>=85?"#00d4aa":avg>=75?"#3b82f6":avg>=65?"#f59e0b":avg>0?"#fb7185":"rgba(226,232,240,0.3)";

  /* Build grade rows */
  var mandRows=MANDATORY.map(function(s){return gi(s,"#6366f1")}).join("");
  var mathRows=MATH_OPTS.map(function(o){return giMath(o)}).join("");
  var elecRows=ELECTIVES.map(function(o){return giElec(o,!selE.includes(o.k)&&eCnt>=3)}).join("");
  var fieldCards=FIELDS.map(function(f){
    var a=selF.includes(f.k);
    return '<div class="fcard'+(a?" on":"")+'" id="fcard-'+f.k+'" onclick="toggleField(\''+f.k+'\')"> '
      +'<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">'
      +'<span style="font-size:14px">'+esc(f.ic)+'</span>'
      +'<span style="font-size:11px;font-weight:700;color:'+(a?"#00d4aa":"#e2e8f0")+'">'+esc(f.l)+'</span></div>'
      +'<div style="font-size:9px;color:rgba(226,232,240,0.3)">الحد الأدنى: '+f.min+'%</div></div>';
  }).join("");

  /* Eligible fields for avg panel */
  var eligFields=FIELDS.filter(function(f){return avg>=f.min});
  var eligHtml=eligFields.length?eligFields.map(function(f){
    return '<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">'
      +'<span style="font-size:11px">'+esc(f.ic)+'</span>'
      +'<span style="font-size:9px;color:rgba(226,232,240,0.55)">'+esc(f.l)+'</span>'
      +'<span style="margin-right:auto;font-size:8px;color:#00d4aa">✓</span></div>';
  }).join(""):'<div style="font-size:10px;color:rgba(226,232,240,0.25);line-height:1.6">أدخل الدرجات<br>لرؤية المجالات المؤهلة</div>';

  var errHtml=err?'<div class="errbox">⚠️ '+esc(err)+'</div>':"";

  app.innerHTML=
    /* Header */
    '<div class="hdr">'
    +'<div style="display:flex;align-items:center;gap:10px">'
    +'<div class="logo-icon">🎯</div>'
    +'<div><div class="logo-text">موجه البرامج الذكي</div>'
    +'<div class="logo-sub">برامج القبول الموحد · سلطنة عُمان</div></div></div>'
    +'<div style="font-size:9px;color:rgba(226,232,240,0.3);display:flex;align-items:center;gap:4px">'
    +'<span style="width:5px;height:5px;border-radius:50%;background:#00d4aa;display:inline-block"></span>مدعوم بالذكاء الاصطناعي</div></div>'

    /* 2-col layout */
    +'<div class="form-layout">'

    /* Left column */
    +'<div>'

    /* Section 1: Identity */
    +'<div class="card">'
    +'<div class="sec-hdr">'
    +'<div class="sec-ic" style="background:rgba(99,102,241,0.12)">👤</div>'
    +'<div><div class="sec-name">بيانات الطالب</div><div class="sec-sub">الخطوة الأولى</div></div></div>'
    +'<div class="g2">'
    +'<div><label class="flbl">الاسم الكامل</label>'
    +'<input type="text" placeholder="مثال: سالم بن خالد البلوشي" value="'+esc(name)+'" oninput="S.name=this.value"></div>'
    +'<div><label class="flbl">الجنس</label>'
    +'<select onchange="S.gender=this.value">'
    +'<option'+(gender==="ذكر"?" selected":"")+'>ذكر</option>'
    +'<option'+(gender==="أنثى"?" selected":"")+'>أنثى</option>'
    +'</select></div></div></div>'

    /* Section 2: Grades */
    +'<div class="card">'
    +'<div class="sec-hdr">'
    +'<div class="sec-ic" style="background:rgba(99,102,241,0.12)">📝</div>'
    +'<div><div class="sec-name">درجات المواد الدراسية</div>'
    +'<div class="sec-sub">أدخل درجات الفصل الأول والثاني لكل مادة</div></div></div>'
    /* Column headers */
    +'<div class="fhdr-row">'
    +'<span>المادة الدراسية</span><span>درجة الفصل الأول</span><span>درجة الفصل الثاني</span></div>'
    /* Mandatory */
    +'<div class="sub-lbl" style="color:#818cf8"><span>📌</span> المواد الأساسية الإجبارية</div>'
    +mandRows
    /* Math */
    +'<div class="sub-lbl" style="color:#00d4aa;margin-top:10px"><span>🔢</span> الرياضيات — أساسية أو متقدمة (إجباري)</div>'
    +'<div class="rgroup">'+mathRows+'</div>'
    /* Electives */
    +'<div class="sub-lbl" style="color:#fbbf24;margin-top:10px"><span>📚</span> المواد الاختيارية'
    +' <span style="font-size:9px;font-weight:400;color:rgba(226,232,240,0.38)">اختر 3 من 11</span>'
    +' <span id="ebadge" style="font-size:10px;padding:2px 8px;border-radius:6px;color:'
    +(eCnt===3?"#00d4aa":eCnt>0?"#f59e0b":"#fb7185")+'">'
    +(eCnt===0?"لم تختر بعد":eCnt<3?"اخترت "+eCnt+" من 3":"✅ اكتملت")
    +'</span></div>'
    +'<div class="rgroup">'+elecRows+'</div></div>'

    /* Section 3: Fields */
    +'<div class="card">'
    +'<div class="sec-hdr">'
    +'<div class="sec-ic" style="background:rgba(0,212,170,0.1)">🗂️</div>'
    +'<div><div class="sec-name">مجالات التخصص</div>'
    +'<div class="sec-sub">اختر مجالاً أو أكثر للمنافسة</div></div></div>'
    +'<div class="gfields">'+fieldCards+'</div></div>'

    /* Section 4: Analyze */
    +errHtml
    +'<button class="sbtn" onclick="analyze()">🔍 تحليل البرامج المؤهلة وحساب المعدل التنافسي</button>'

    +'</div>'/* /form-col */

    /* Right: Avg panel */
    +'<div class="avg-panel">'
    +'<div class="avg-panel-inner">'
    +'<div style="font-size:9px;color:rgba(0,212,170,0.7);font-weight:700;margin-bottom:6px;letter-spacing:.5px">المعدل العام</div>'
    +'<div id="avgNum" class="avgnum" style="color:'+avgCol+'">'+(avg>0?avg.toFixed(2)+"%":"—")+'</div>'
    +'<div style="margin:10px 0 6px;height:4px;border-radius:2px;background:rgba(255,255,255,0.07);overflow:hidden">'
    +'<div id="avgBar" style="height:100%;border-radius:2px;width:'+Math.min(avg,100)+'%;background:linear-gradient(90deg,#3b82f6,'+avgCol+');transition:width .6s ease"></div></div>'
    +'<div id="avgSub" style="font-size:10px;color:rgba(226,232,240,0.4);margin-bottom:12px">'
    +(filledCount===0?"أدخل درجات المواد":filledCount<8?filledCount+" / 8 مواد":"✅ جميع المواد")
    +'</div>'
    +'<div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:10px">'
    +'<div style="font-size:8px;color:rgba(226,232,240,0.3);margin-bottom:7px">المجالات المؤهلة</div>'
    +eligHtml+'</div></div></div>'

    +'</div>'/* /form-layout */

    +'<div style="text-align:center;font-size:10px;color:rgba(226,232,240,0.15);margin-top:16px;padding:14px">'
    +'موجه البرامج الذكي · برامج القبول الموحد · سلطنة عُمان</div>';
}

render();
</script>
</body>
</html>
